<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ford MEL Individual Scorecard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  /* ── Avenger Logistics Brand Variables ── */
  :root {
    --avb:   #659AD2;   /* Avenger Blue */
    --avr:   #AC171C;   /* Avenger Red  */
    --dark:  #192633;   /* Dark Blue    */
    --dgray: #808285;   /* Dark Gray    */
    --mgray: #BCBEC0;   /* Medium Gray  */
    --lgray: #F0F0F0;   /* Light Gray   */
    --green: #2e7d32;
    --yellow:#b97a00;
    --border:#BCBEC0;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Lato', 'Segoe UI', Arial, sans-serif; font-weight: 400; background: var(--lgray); color: #1a1a1a; font-size: 13px; }
  a { color: var(--avb); cursor: pointer; text-decoration: none; }

  /* ── Layout ── */
  .app-header { background: var(--dark); color: white; padding: 0; position: relative; }
  .app-header-inner { display: flex; align-items: center; gap: 18px; padding: 14px 24px; }
  .app-header-accent { height: 4px; background: linear-gradient(90deg, var(--avr) 0%, var(--avr) 40%, var(--avb) 60%, var(--avb) 100%); }
  .app-header .app-title { font-family: 'Barlow', Arial, sans-serif; font-weight: 700; font-size: 22px; letter-spacing: 0.04em; text-transform: uppercase; color: white; }
  .app-header .subtitle { font-family: 'Lato', Arial, sans-serif; font-size: 12px; color: var(--mgray); margin-top: 2px; }
  .header-logo { height: 40px; }
  .header-divider { width: 1px; height: 36px; background: rgba(255,255,255,0.18); }
  .tabs { display: flex; background: #fff; border-bottom: 2px solid var(--border); padding: 0 24px; }
  .tab { padding: 11px 22px; cursor: pointer; border-bottom: 3px solid transparent; font-family: 'Lato', Arial, sans-serif; font-weight: 700; color: var(--dgray); font-size: 13px; transition: color 0.15s; }
  .tab.active { border-bottom-color: var(--avb); color: var(--dark); }
  .tab:hover:not(.active) { color: var(--avb); }
  .content { padding: 20px; max-width: 1400px; margin: 0 auto; }

  /* ── Upload ── */
  .drop-zone { border: 2px dashed var(--mgray); border-radius: 10px; background: #fff; padding: 44px 20px; text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s; }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--avb); background: #f0f6ff; }
  .drop-zone-icon { font-size: 40px; margin-bottom: 10px; }
  .drop-zone h3 { font-family: 'Barlow', Arial, sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 0.03em; text-transform: uppercase; color: var(--dark); margin-bottom: 8px; }
  .drop-zone p { color: var(--dgray); font-size: 12px; }
  .file-input { display: none; }
  .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-family: 'Lato', inherit; font-weight: 700; }
  .btn-primary { background: var(--avb); color: white; }
  .btn-primary:hover { background: #4d80b8; }
  .btn-danger { background: var(--avr); color: white; }
  .btn-danger:hover { background: #8c1115; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .loaded-files { margin-top: 16px; }
  .summary-bar { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 14px 24px; margin-top: 16px; display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
  .summary-stat { text-align: center; }
  .summary-stat .val { font-family: 'Barlow', Arial, sans-serif; font-size: 26px; font-weight: 700; color: var(--dark); }
  .summary-stat .lbl { font-size: 11px; color: var(--dgray); margin-top: 2px; }
  .summary-divider { width: 1px; height: 44px; background: var(--border); }

  /* ── Leaderboard header ── */
  .leaderboard-header { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; }
  .page-title { font-family: 'Barlow', Arial, sans-serif; font-weight: 700; font-size: 17px; letter-spacing: 0.03em; text-transform: uppercase; color: var(--dark); }
  .note { font-size: 11px; color: var(--dgray); font-style: italic; margin-top: 2px; }

  /* ── Tables ── */
  .table-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
  table { width: 100%; border-collapse: collapse; background: #fff; }
  thead th { background: var(--dark); color: white; padding: 10px 11px; text-align: center; white-space: nowrap; font-family: 'Barlow', Arial, sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; position: sticky; top: 0; z-index: 1; cursor: pointer; user-select: none; }
  thead th:hover { background: #243546; }
  thead th.sort-asc::after { content: ' ▲'; font-size: 9px; }
  thead th.sort-desc::after { content: ' ▼'; font-size: 9px; }
  tbody tr { border-bottom: 1px solid #e8e8e8; cursor: pointer; transition: background 0.1s; }
  tbody tr:nth-child(even) { background: #fafafa; }
  tbody tr:hover { background: #eef4fb; }
  tbody tr.carrier-row { background: #e8f0f8; cursor: default; border-bottom: 2px solid var(--avb); }
  tbody tr.carrier-row:hover { background: #ddeaf6; }
  td { padding: 8px 11px; text-align: center; white-space: nowrap; }
  td.name-cell { text-align: left; font-weight: 700; color: var(--dark); }
  .rank { color: var(--mgray); font-size: 11px; }
  .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 24px; height: 24px; border-radius: 50%; font-size: 11px; font-weight: 700; font-family: 'Barlow', Arial, sans-serif; }
  .rank-badge.gold   { background: #b8860b; color: #fff8dc; }
  .rank-badge.silver { background: #808285; color: #ffffff; }
  .rank-badge.bronze { background: #8b5e3c; color: #fff0e0; }
  .rank-badge.other  { background: transparent; color: var(--mgray); }

  /* ── Score cells ── */
  .score { font-family: 'Lato', Arial, sans-serif; font-weight: 700; font-size: 13px; }
  .score.green  { color: var(--green); }
  .score.yellow { color: var(--yellow); }
  .score.red    { color: var(--avr); }
  .score.gray   { color: var(--mgray); }
  .score-cell { min-width: 72px; }
  .score-cell-bg-green  { background: rgba(46,125,50,0.07); }
  .score-cell-bg-yellow { background: rgba(185,122,0,0.07); }
  .score-cell-bg-red    { background: rgba(172,23,28,0.07); }
  .delta { font-size: 11px; font-weight: 400; }
  .delta.neg { color: var(--avr); }
  .delta.pos { color: var(--green); }
  .low-n { color: var(--mgray); font-style: italic; font-size: 11px; }

  /* ── Individual view ── */
  .back-btn { background: none; border: 1.5px solid var(--avb); color: var(--avb); border-radius: 6px; padding: 5px 14px; cursor: pointer; font-family: 'Lato', Arial, sans-serif; font-weight: 700; font-size: 12px; margin-bottom: 16px; transition: background 0.15s, color 0.15s; }
  .back-btn:hover { background: var(--avb); color: white; }
  .person-header { background: #fff; border: 1px solid var(--border); border-radius: 8px; padding: 18px 22px; margin-bottom: 16px; display: flex; align-items: center; gap: 24px; }
  .person-name { font-family: 'Barlow', Arial, sans-serif; font-weight: 700; font-size: 26px; letter-spacing: 0.02em; text-transform: uppercase; color: var(--dark); }
  .person-composite { font-family: 'Barlow', Arial, sans-serif; font-size: 38px; font-weight: 700; }
  .person-composite.green  { color: var(--green); }
  .person-composite.yellow { color: var(--yellow); }
  .person-composite.red    { color: var(--avr); }
  .score-breakdown { background: #fff; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; margin-bottom: 16px; }
  .score-breakdown table thead th { font-size: 11px; padding: 8px 11px; }
  .category-row td { font-weight: 700; background: #eef4fb; color: var(--dark); }

  /* ── Defect tables ── */
  .defect-section { background: #fff; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; overflow: hidden; }
  .defect-section-header { padding: 10px 16px; background: #f5f5f5; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; user-select: none; transition: background 0.15s; }
  .defect-section-header:hover { background: #eef4fb; }
  .defect-section-title { font-family: 'Lato', Arial, sans-serif; font-weight: 700; color: var(--dark); font-size: 13px; }
  .defect-count { font-size: 11px; color: var(--dgray); }
  .toggle-icon { color: var(--dgray); font-size: 11px; }
  .defect-table-wrap { overflow-x: auto; }
  .defect-table { font-size: 11px; }
  .defect-table thead th { background: #364d60; font-size: 11px; padding: 6px 9px; }
  .defect-table td { padding: 5px 9px; font-size: 11px; }
  .fail-row td { background: #fff5f5; }

  /* ── Footnote ── */
  .footnote { font-size: 11px; color: var(--dgray); font-style: italic; padding: 8px 16px; border-top: 1px solid var(--border); background: #fafafa; }

  /* ── Empty / loading states ── */
  .empty-state { text-align: center; padding: 60px 20px; color: var(--dgray); }
  .empty-state h3 { margin-bottom: 8px; color: var(--dark); font-family: 'Barlow', Arial, sans-serif; text-transform: uppercase; }
  .loading { text-align: center; padding: 40px; color: var(--avb); font-size: 14px; font-family: 'Lato', Arial, sans-serif; }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useRef, useMemo } = React;

// ─── Sortable hook ────────────────────────────────────────────────────────────
function useSortable(rows) {
  const [sortCol, setSortCol] = useState(null);
  const [sortDir, setSortDir] = useState('asc');
  function handleSort(col) {
    if (sortCol === col) { setSortDir(d => d === 'asc' ? 'desc' : 'asc'); }
    else { setSortCol(col); setSortDir('asc'); }
  }
  const sorted = useMemo(() => {
    if (!sortCol) return rows;
    return [...rows].sort((a, b) => {
      let av = a[sortCol], bv = b[sortCol];
      if (av instanceof Date) av = av.getTime();
      if (bv instanceof Date) bv = bv.getTime();
      if (av == null) return 1; if (bv == null) return -1;
      const an = parseFloat(av), bn = parseFloat(bv);
      if (!isNaN(an) && !isNaN(bn)) return sortDir === 'asc' ? an - bn : bn - an;
      return sortDir === 'asc'
        ? String(av).localeCompare(String(bv))
        : String(bv).localeCompare(String(av));
    });
  }, [rows, sortCol, sortDir]);
  return { sorted, sortCol, sortDir, handleSort };
}
function STh({ col, sk, sd, onSort, children }) {
  return (
    <th onClick={() => onSort(col)} style={{cursor:'pointer',userSelect:'none'}}>
      {children}{sk===col ? (sd==='asc' ? ' ▲' : ' ▼') : ''}
    </th>
  );
}

// ─── Constants ───────────────────────────────────────────────────────────────
const TARGETS = {
  composite: { green: 0.97, yellow: 0.90 },
  otp:       { green: 0.98, yellow: 0.90 },
  comm:      { green: 0.95, yellow: 0.88 },
  asn:       { green: 0.98, yellow: 0.90 },
};

const MIN_LOADS = 5;

function getColor(score, type) {
  if (score === null || score === undefined) return 'gray';
  const t = TARGETS[type] || TARGETS.composite;
  if (score >= t.green) return 'green';
  if (score >= t.yellow) return 'yellow';
  return 'red';
}

function pct(v, decimals = 1) {
  if (v === null || v === undefined) return '—';
  return (v * 100).toFixed(decimals) + '%';
}

function toTitleCase(str) {
  if (!str) return str;
  return String(str).toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
}

function normName(name) {
  return toTitleCase(String(name || '').trim());
}

// ─── Excel Parser ─────────────────────────────────────────────────────────────
function detectFileType(sheetNames) {
  if (sheetNames.includes('OTP_Defect')) return 'scorecard';
  if (sheetNames.includes('Worksheet'))  return 'loadlist';
  return 'unknown';
}

function parseWorkbook(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const wb = XLSX.read(e.target.result, { type: 'binary', cellDates: true });
        const sheets = {};
        wb.SheetNames.forEach(name => {
          sheets[name] = XLSX.utils.sheet_to_json(wb.Sheets[name], { defval: null });
        });
        const fileType = detectFileType(wb.SheetNames);
        resolve({ sheets, fileType, fileName: file.name });
      } catch(err) { reject(err); }
    };
    reader.onerror = reject;
    reader.readAsBinaryString(file);
  });
}

// ─── Data Processing ──────────────────────────────────────────────────────────
// parsedFiles is an array of { sheets, fileType, fileName }
function processData(parsedFiles) {
  const SKIP_NAMES = new Set(['Ford', 'Ford Admin', 'Ford Inbound', 'House Account', '',
    'Trey Elliott', 'Sunny Tate']);

  const merged = {
    otp: [], otc: [], gps: [], eta: [], asn: [],
    carrierScore: [], commSummary: [], checkCall: []
  };

  // Per-person load counts from Load List files (deduplicated by LOAD#)
  const loadListLoads = new Set();   // track LOAD# already counted
  const loadListCounts = {};         // person → load count from Load List
  let hasLoadList = false;

  // Fallback: Raw Data sheet load counts (deduplicated by LOAD#)
  const rawDataLoads = new Set();
  const rawDataCounts = {};

  parsedFiles.forEach(({ sheets, fileType }) => {
    if (fileType === 'loadlist') {
      hasLoadList = true;
      (sheets['Worksheet'] || []).forEach(r => {
        const loadNum = String(r['LOAD#'] || '').trim();
        const person = normName(r['LOAD ACCT MANAGER'] || '');
        if (!loadNum || !person || SKIP_NAMES.has(person)) return;
        if (loadListLoads.has(loadNum)) return; // deduplicate across weeks
        loadListLoads.add(loadNum);
        loadListCounts[person] = (loadListCounts[person] || 0) + 1;
      });
    }

    if (fileType === 'scorecard') {
      const push = (key, sheetName, dedup) => {
        const rows = sheets[sheetName] || [];
        if (!dedup) { merged[key].push(...rows); return; }
        const existing = new Set(merged[key].map(r => dedup(r)));
        rows.forEach(r => { if (!existing.has(dedup(r))) merged[key].push(r); });
      };
      push('otp', 'OTP_Defect',         r => `${r['Load ID']}|${r['214 Event']}`);
      push('otc', 'OTC_Defect',         r => `${r['Load ID']}|${r['Event Description']}`);
      push('gps', 'GPS_Defect',         r => `${r['Load ID']}`);
      push('eta', 'ETA_Defect',         r => `${r['Load ID']}`);
      push('asn', 'ASN_Defect',         r => `${r['Load ID']}`);
      push('checkCall', 'Check_Call_Defect', null);
      // Always use the most recently uploaded scorecard for carrier benchmarks
      if (sheets['Carrier_Score'])  merged.carrierScore  = sheets['Carrier_Score'];
      if (sheets['Comm_Summary'])   merged.commSummary   = sheets['Comm_Summary'];

      // Build Raw Data fallback counts (deduplicated)
      (sheets['Raw Data'] || []).forEach(r => {
        const loadNum = String(r['LOAD#'] || '').trim();
        const person = normName(r['LOAD ACCT MANAGER'] || '');
        if (!loadNum || !person || SKIP_NAMES.has(person)) return;
        if (rawDataLoads.has(loadNum)) return;
        rawDataLoads.add(loadNum);
        rawDataCounts[person] = (rawDataCounts[person] || 0) + 1;
      });
    }
  });

  // Use Load List counts if available, otherwise fall back to Raw Data
  const loadCounts = hasLoadList ? loadListCounts : rawDataCounts;
  const totalLoads = Object.values(loadCounts).reduce((s, n) => s + n, 0);

  // Carrier totals
  const csRow = k => (merged.carrierScore.find(r => r['Category'] === k) || {});
  const commRow = k => (merged.commSummary.find(r => r['Category'] === k) || {});
  const carrier = {
    otpOpps:     csRow('On Time Performance')['Opportunities'] || 0,
    otpSucc:     csRow('On Time Performance')['Success'] || 0,
    otpScore:    csRow('On Time Performance')['Score'] || 0,
    commOpps:    csRow('Communication')['Opportunities'] || 0,
    commSucc:    csRow('Communication')['Success'] || 0,
    commScore:   csRow('Communication')['Score'] || 0,
    asnOpps:     csRow('ASN Containment')['Opportunities'] || 0,
    asnSucc:     csRow('ASN Containment')['Success'] || 0,
    asnScore:    csRow('ASN Containment')['Score'] || 0,
    overall:     csRow('Overall')['Score'] || 0,
    overallOpps: csRow('Overall')['Opportunities'] || 0,
    overallSucc: csRow('Overall')['Success'] || 0,
    etaOpps:     commRow('ETA')['SumOfOpportunities'] || 0,
    gpsOpps:     commRow('GPS')['SumOfOpportunities'] || 0,
    otcOpps:     commRow('On Time Communication')['SumOfOpportunities'] || 0,
    etaScore:    commRow('ETA')['Comm Score'] || 0,
    gpsScore:    commRow('GPS')['Comm Score'] || 0,
    otcScore:    commRow('On Time Communication')['Comm Score'] || 0,
  };

  // Collect all lane admins from defect sheets + load counts
  const allPeople = new Set();
  ['otp','otc','gps','eta','asn'].forEach(key => {
    merged[key].forEach(r => {
      const n = normName(r['Lane Admin']);
      if (n && !SKIP_NAMES.has(n)) allPeople.add(n);
    });
  });
  Object.keys(loadCounts).forEach(n => { if (!SKIP_NAMES.has(n)) allPeople.add(n); });

  // Compute scores per person
  const people = [];
  allPeople.forEach(person => {
    const loads = loadCounts[person] || 0;
    const loadShare = totalLoads > 0 ? loads / totalLoads : 0;

    // ── OTP ──────────────────────────────────────────────────────
    const otpRows = merged.otp.filter(r => normName(r['Lane Admin']) === person);
    const otpDefects = otpRows.filter(r => r['Success'] === 0 || r['Success'] === '0');
    const otpDefectsDA = otpDefects.filter(r => r['214 Event'] === 'DA');
    const otpDefectsPA = otpDefects.filter(r => r['214 Event'] === 'PA');

    const estOtpOpps = loadShare * carrier.otpOpps;
    const otpScore = estOtpOpps > 0
      ? Math.max(0, (estOtpOpps - otpDefects.length) / estOtpOpps)
      : null;
    const otpOppsEst = Math.round(estOtpOpps);

    // ── GPS ──────────────────────────────────────────────────────
    const gpsRows = merged.gps.filter(r => normName(r['Lane Admin']) === person);
    const gpsDefects = gpsRows.filter(r => r['Success'] === 0 || r['Success'] === '0');
    const estGpsOpps = loadShare * carrier.gpsOpps;
    const gpsScore = estGpsOpps > 0
      ? Math.max(0, (estGpsOpps - gpsDefects.length) / estGpsOpps)
      : 1.0;
    const gpsOppsEst = Math.round(estGpsOpps);

    // ── OTC (Stop Updates) ────────────────────────────────────────
    const otcRows = merged.otc.filter(r => normName(r['Lane Admin']) === person);
    const otcDefects = otcRows.filter(r => {
      const d = parseFloat(r['Communication Delay']);
      return !isNaN(d) && d > 30;
    });
    const estOtcOpps = loadShare * carrier.otcOpps;
    const otcScore = estOtcOpps > 0
      ? Math.max(0, (estOtcOpps - otcDefects.length) / estOtcOpps)
      : 1.0;
    const otcOppsEst = Math.round(estOtcOpps);

    // ── ETA ──────────────────────────────────────────────────────
    const etaRows = merged.eta.filter(r => normName(r['Lane Admin']) === person);
    // All ETA_Defect rows are failures; count them
    const etaDefects = etaRows.length;
    const estEtaOpps = loadShare * carrier.etaOpps;
    const etaScore = estEtaOpps > 0
      ? Math.max(0, (estEtaOpps - etaDefects) / estEtaOpps)
      : 1.0;
    const etaOppsEst = Math.round(estEtaOpps);

    // ── Comm ─────────────────────────────────────────────────────
    const commScore = otcScore * 0.55 + etaScore * 0.25 + gpsScore * 0.20;

    // ── ASN ──────────────────────────────────────────────────────
    const asnRows = merged.asn.filter(r => normName(r['Lane Admin']) === person);
    let asnScore, asnOpps, asnSucc;
    if (asnRows.length === 0) {
      asnScore = 1.0; asnOpps = 0; asnSucc = 0;
    } else {
      const asnCompliant = asnRows.filter(r => {
        const atFault = String(r['Carrier at Fault?'] || '').toLowerCase();
        const delayed = String(r['Delayed Response'] || '').toLowerCase();
        return atFault !== 'yes' && atFault !== 'true' && delayed !== 'yes' && delayed !== 'true';
      });
      asnOpps = asnRows.length;
      asnSucc = asnCompliant.length;
      asnScore = asnOpps > 0 ? asnSucc / asnOpps : 1.0;
    }

    // ── Composite ────────────────────────────────────────────────
    const composite = otpScore !== null
      ? otpScore * 0.60 + commScore * 0.30 + asnScore * 0.10
      : null;

    people.push({
      name: person,
      loads,
      composite,
      otp: { score: otpScore, opps: otpOppsEst, defects: otpDefects.length,
             daDefects: otpDefectsDA.length, paDefects: otpDefectsPA.length,
             allRows: otpRows },
      comm: { score: commScore,
              otc: { score: otcScore, opps: otcOppsEst, defects: otcDefects.length, rows: otcRows },
              eta: { score: etaScore, opps: etaOppsEst, defects: etaRows.length, rows: etaRows },
              gps: { score: gpsScore, opps: gpsOppsEst, defects: gpsDefects.length, rows: gpsRows } },
      asn: { score: asnScore, opps: asnOpps, succ: asnSucc, rows: asnRows },
    });
  });

  const ccTotal = merged.checkCall.length;
  const ccLate = merged.checkCall.filter(r => r['Late Response'] == 1 || r['NO Response'] == 1).length;
  return { people, carrier, ccTotal, ccLate, hasLoadList, totalLoads };
}

// ─── Score Cell ───────────────────────────────────────────────────────────────
function ScoreCell({ score, type, showDelta, minN, n }) {
  const insufficient = minN && n < MIN_LOADS;
  if (score === null || score === undefined || insufficient) {
    return <td className="score-cell"><span className="low-n">{insufficient ? `n<${MIN_LOADS}` : '—'}</span></td>;
  }
  const color = getColor(score, type);
  const target = TARGETS[type]?.green;
  return (
    <td className={`score-cell score-cell-bg-${color}`}>
      <span className={`score ${color}`}>{pct(score)}</span>
      {showDelta && target && (
        <div className={`delta ${score >= target ? 'pos' : 'neg'}`}>
          {score >= target ? '+' : ''}{pct(score - target, 1)}
        </div>
      )}
    </td>
  );
}

function StatusDot({ score, type, n }) {
  if (n !== undefined && n < MIN_LOADS) return <span>⬜</span>;
  if (score === null) return <span>—</span>;
  const color = getColor(score, type);
  if (color === 'green') return <span>🟢</span>;
  if (color === 'yellow') return <span>🟡</span>;
  return <span>🔴</span>;
}

function fmtDT(val) {
  if (!val) return '—';
  if (val instanceof Date) return val.toLocaleDateString() + ' ' + val.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
  const s = String(val);
  return s.length > 20 ? s.slice(0, 19) : s;
}

function Leaderboard({ data, onSelectPerson, onDownloadSnapshot }) {
  const { people, carrier } = data;
  const [sortKey, setSortKey] = useState('composite');
  const [sortDir, setSortDir] = useState('desc');

  const getSortVal = useCallback((p, key) => {
    const m = {
      composite: p.composite,
      otp: p.otp.score,
      comm: p.comm.score,
      otc: p.comm.otc.score,
      eta: p.comm.eta.score,
      gps: p.comm.gps.score,
      asn: p.asn.score,
      loads: p.loads,
    };
    return m[key] ?? -Infinity;
  }, []);

  const sorted = useMemo(() => {
    return [...people].sort((a, b) => {
      const va = getSortVal(a, sortKey);
      const vb = getSortVal(b, sortKey);
      return sortDir === 'desc' ? vb - va : va - vb;
    });
  }, [people, sortKey, sortDir]);

  const handleSort = key => {
    if (sortKey === key) setSortDir(d => d === 'desc' ? 'asc' : 'desc');
    else { setSortKey(key); setSortDir('desc'); }
  };

  const Th = ({ k, children }) => (
    <th onClick={() => handleSort(k)}
        className={sortKey === k ? `sort-${sortDir}` : ''}>
      {children}
    </th>
  );

  const carrierComposite = carrier.otpScore * 0.60 + carrier.commScore * 0.30 + carrier.asnScore * 0.10;

  return (
    <div>
      <div className="leaderboard-header">
        <div>
          <div className="page-title">MEL Individual Scorecard</div>

      <div className="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <Th k="composite">Composite</Th>
              <th style={{textAlign:'left'}}>Name</th>
              <Th k="otp">OTP</Th>
              <Th k="comm">Comm</Th>
              <Th k="otc">Stop Upd.</Th>

  const inputRef = useRef();

  const handleDrop = useCallback(e => {
    e.preventDefault();
    setDragging(false);
    const dropped = Array.from(e.dataTransfer.files).filter(f => f.name.endsWith('.xlsx'));
    if (dropped.length) onFiles(dropped);
  }, [onFiles]);

  const handleChange = e => {
    const sel = Array.from(e.target.files);
    if (sel.length) onFiles(sel);
    e.target.value = '';
  };

  const hasScorecard = parsedFiles.some(f => f.fileType === 'scorecard');
  const hasLoadList  = parsedFiles.some(f => f.fileType === 'loadlist');

  return (
    <div>
      <div
        className={`drop-zone ${dragging ? 'drag-over' : ''}`}
        onDragOver={e => { e.preventDefault(); setDragging(true); }}
        onDragLeave={() => setDragging(false)}
        onDrop={handleDrop}
        onClick={() => inputRef.current.click()}
      >
        <div className="drop-zone-icon">📂</div>
        <h3>Upload Weekly Files</h3>
        <p>Drag & drop one or more .xlsx files — Scorecard and/or Load List — or click to browse</p>
        <p style={{marginTop:'6px',fontSize:'11px',color:'#999'}}>
          📊 Scorecard: <em>AVGD Phase1 SC - WE 3-28-26.xlsx</em> &nbsp;|&nbsp; 📋 Load List: <em>All Loads WE 3-28-26.xlsx</em>
        </p>
        <input ref={inputRef} className="file-input" type="file" accept=".xlsx" multiple onChange={handleChange} />
      </div>

      {parsedFiles.length > 0 && (
        <>
          <div className="loaded-files" style={{marginTop:'12px'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}}>
              <strong style={{fontSize:'13px'}}>Loaded files:</strong>
              <button className="btn btn-danger btn-sm" onClick={onClear}>Clear All</button>
            </div>
            {parsedFiles.map((f, i) => {
              const meta = FILE_TYPE_META[f.fileType] || FILE_TYPE_META.unknown;
              return (
                <span key={i} style={{display:'inline-flex',alignItems:'center',gap:'5px',borderRadius:'20px',padding:'4px 10px',margin:'3px',...meta.chipStyle,fontSize:'12px'}}>
                  {meta.icon} {f.fileName}
                  <span style={{fontSize:'10px',opacity:0.75,marginLeft:'2px'}}>({meta.label})</span>
                </span>
              );
            })}
          </div>

          {/* Warning if load list is missing */}
          {hasScorecard && !hasLoadList && (
            <div style={{background:'#fff8e1',border:'1px solid #ffe082',borderRadius:'6px',padding:'10px 14px',marginTop:'10px',fontSize:'12px',color:'#7a5c00'}}>
              ⚠️ <strong>No Load List uploaded.</strong> Load counts are being estimated from the Raw Data tab inside the Scorecard, which may include historical loads across many weeks. For more accurate scores, also upload the matching <em>All Loads WE [date].xlsx</em> file.
            </div>
          )}

          {summary && (
            <div className="summary-bar">
              <div className="summary-stat"><div className="val">{summary.scorecardCount}</div><div className="lbl">📊 Scorecards</div></div>
              <div className="summary-divider"/>
              <div className="summary-stat"><div className="val">{summary.loadListCount}</div><div className="lbl">📋 Load Lists</div></div>
              <div className="summary-divider"/>
              <div className="summary-stat"><div className="val">{summary.totalLoads.toLocaleString()}</div><div className="lbl">Total Loads</div></div>
              <div className="summary-divider"/>
              <div className="summary-stat"><div className="val">{summary.teamMembers}</div><div className="lbl">Team Members</div></div>
              <div className="summary-divider"/>
              <div className="summary-stat"><div className="val">{summary.otpDefects}</div><div className="lbl">OTP Defects</div></div>
              <div className="summary-divider"/>
              <div className="summary-stat"><div className="val">{summary.commDefects}</div><div className="lbl">Comm Defects</div></div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ─── Snapshot export ──────────────────────────────────────────────────────────
function downloadSnapshot(data, weekLabel) {
  fetch(window.location.href)
    .then(r => r.text())
    .then(src => {
      const injection = `<script>window.__SNAPSHOT__ = ${JSON.stringify(data)}; window.__SNAPSHOT_WEEK__ = ${JSON.stringify(weekLabel)};<\/script>`;
      const out = src.replace('</head>', injection + '\n</head>');
      const blob = new Blob([out], { type: 'text/html' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = `MEL-Snapshot-${weekLabel}.html`;
      a.click();
    });
}

        </div>
        {!(window.__SNAPSHOT__||null) && (
          <div className={`tab ${tab === 'upload' ? 'active' : ''}`} onClick={() => { setSelectedPerson(null); setTab('upload'); }}>
            Upload {parsedFiles.length > 0 && `(${parsedFiles.length})`}
          </div>
        )}
      </div>

      <div className="content">
        {loading && <div className="loading">⏳ Processing Excel data...</div>}
        {error && <div style={{background:'#ffebee',border:'1px solid #ffcdd2',borderRadius:'6px',padding:'12px 16px',color:'#c62828',marginBottom:'12px'}}>{error}</div>}

        {!loading && tab === 'upload' && (
          <UploadView parsedFiles={parsedFiles} onFiles={handleFiles} onClear={handleClear} summary={summary} />
        )}

        {!loading && (tab === 'leaderboard') && (
          !data
            ? <div className="empty-state"><h3>No data loaded</h3><p>Upload a BTMS scorecard file to get started.</p></div>
            : <Leaderboard data={data} onSelectPerson={handleSelectPerson}
                onDownloadSnapshot={() => {
                  const weekLabel = new Date().toISOString().slice(0,10);
                  downloadSnapshot(data, weekLabel);
                }} />
        )}

        {!loading && tab === 'individual' && selectedPerson && data && (
          <IndividualView person={selectedPerson} carrier={data.carrier} onBack={handleBack} />
        )}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
